<!DOCTYPE html>
<html>
<head>
    <title>My App</title>
</head>
<body>

    <h1>Ready to Play?</h1>
    <button onclick="launchGame()">Launch in Hidden Tab</button>

    <script>
        function launchGame() {
            // 1. Open a new empty window
            var win = window.open();
            
            // 2. Set the URL of the new window to about:blank
            win.location.href = "about:blank";

            // 3. Create a style to make the game full screen
            var style = win.document.createElement('style');
            style.innerHTML = "body,html{margin:0;padding:0;height:100%;overflow:hidden;}iframe{width:100%;height:100%;border:none;}";
            win.document.head.appendChild(style);

            // 4. Create the iframe for the game
            var iframe = win.document.createElement('iframe');
            iframe.src = "https://modernclient.online";
            
            // 5. Add the game to the new window
            win.document.body.appendChild(iframe);
        }
    </script>

</body>
</html>

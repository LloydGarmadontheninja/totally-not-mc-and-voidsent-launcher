<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Private Portal</title>
    <style>
        /* This makes the page look clean */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f0f2f5; 
        }
        h1 { color: #1c1e21; }
        button { 
            padding: 15px 40px; 
            font-size: 18px; 
            font-weight: bold;
            background-color: #007AFF; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: transform 0.2s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>Web App Launcher</h1>
    <button onclick="openGame()">Launch Site</button>

    <script>
        function openGame() {
            // 1. Attempt to open the blank window immediately
            var newWin = window.open("about:blank", "_blank");

            // 2. Check if Safari/Chrome blocked the popup
            if (!newWin || newWin.closed || typeof newWin.closed == 'undefined') { 
                alert("POPUP BLOCKED: Please click the 'Always Allow' icon in your browser address bar and try again.");
                return;
            }

            // 3. Define the content to put inside the about:blank page
            var gameUrl = "https://modernclient.online";
            
            // 4. Inject the Game into the blank window
            newWin.document.body.style.margin = "0";
            newWin.document.body.style.height = "100vh";
            
            var iframe = newWin.document.createElement('iframe');
            iframe.style.border = "none";
            iframe.style.width = "100%";
            iframe.style.height = "100%";
            iframe.style.margin = "0";
            iframe.src = gameUrl;

            newWin.document.body.appendChild(iframe);
        }
    </script>
</body>
</html>
